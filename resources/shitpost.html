    const objects = [
      "soviet lens",
      "Zenit camera",
      "vintage camera",
      "vintage lens",
      "Helios-44",
      "russian camera",
      "point and shot",
      "expired film",
      "kit zoom",
      "camera bag",
      "tripod",
      "CineShiit",
      "X1ooV",
      null
    ];

    const root = document.getElementById("photo-title-generator");
    const nounInput = root.querySelector("#ptg-noun");
    const positiveInput = root.querySelector("#ptg-positive");
    const negativeInput = root.querySelector("#ptg-negative");
    const generateButton = root.querySelector("#ptg-generate");
    const output = root.querySelector("#ptg-output");

    function randomItem(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function cleanNoun(value) {
      const text = String(value || "").trim();
      return text && text.toLowerCase() !== "null" ? text : "";
    }

    function selectedSentiment() {
      if (positiveInput.checked && !negativeInput.checked) return "positive";
      if (negativeInput.checked && !positiveInput.checked) return "negative";
      return randomItem(["positive", "negative", "neutral"]);
    }

    function fillTokens(text, noun) {
      return text
        .replace(/\[n\]/g, noun)
        .replace(/\[#\]/g, String(randomInt(1, 20)))
        .replace(/\[Y\]/g, String(randomInt(1970, 2025)));
    }

    function attachTwist(title) {
      const twist = randomItem(twists);
      const mode = randomItem(["comma", "and", "parentheses"]);

      if (mode === "comma") return `${title}, ${twist}`;
      if (mode === "and") return `${title} and ${twist.replace(/^and\s+/i, "")}`;
      return `${title} (${twist})`;
    }

    function generateTitle() {
      let noun = cleanNoun(nounInput.value);

      if (!noun) {
        noun = cleanNoun(randomItem(objects));
      }

      const group = noun ? selectedSentiment() : "void";
      const template = randomItem(templates[group]);
      let title = fillTokens(template.text, noun).replace(/\s+/g, " ").trim();

      if (template.twist && Math.random() < 0.5) {
        title = attachTwist(title);
      }

      output.textContent = title;
    }

    function makeExclusive(changedInput, otherInput) {
      if (changedInput.checked) otherInput.checked = false;
    }

    positiveInput.addEventListener("change", function () {
      makeExclusive(positiveInput, negativeInput);
    });

    negativeInput.addEventListener("change", function () {
      makeExclusive(negativeInput, positiveInput);
    });

    generateButton.addEventListener("click", generateTitle);
    generateTitle();
  })();
